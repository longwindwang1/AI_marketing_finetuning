# ============================================
# QLoRA Fine-Tuning 配置 - 短视频广告流量分析
# 适配 A100 40GB (AutoDL 云端训练)
# ============================================

# 模型配置
model:
  base_model: "Qwen/Qwen2.5-7B-Instruct"
  torch_dtype: "bfloat16"

# QLoRA 配置
qlora:
  r: 64                    # LoRA rank
  lora_alpha: 128          # LoRA alpha (rank 的 2 倍)
  lora_dropout: 0.05
  target_modules:          # 要注入 LoRA 的层
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  quantization_bits: 4     # 4-bit NF4 量化

# 训练超参数
training:
  output_dir: "./output"
  num_train_epochs: 3
  per_device_train_batch_size: 4      # A100 显存充足，可以开 4
  gradient_accumulation_steps: 4      # 有效 batch size = 4 × 4 = 16
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  max_grad_norm: 1.0
  max_seq_length: 2048                # 完整覆盖所有数据
  logging_steps: 5
  save_steps: 11                      # 每 epoch 约 11 步 (176/16)，每轮保存一次
  save_total_limit: 3
  eval_strategy: "steps"
  eval_steps: 11                      # 每 epoch 评估一次
  bf16: true
  gradient_checkpointing: true        # 节省显存
  optim: "paged_adamw_8bit"           # 8-bit 优化器
  dataloader_num_workers: 4           # Linux 下可以多线程加载
  report_to: "none"                   # 改为 "wandb" 可开启日志

# 数据配置
data:
  train_file: "../data/processed/train.jsonl"
  eval_file: "../data/processed/eval.jsonl"
  system_prompt: |
    你是一位专业的短视频广告流量分析师。你精通各大短视频平台（抖音、快手、TikTok、视频号等）的广告投放体系，
    擅长分析广告投放数据、诊断流量问题、优化投放策略、评估素材质量和分析受众特征。
    请基于数据和专业经验，给出准确、可执行的分析和建议。
